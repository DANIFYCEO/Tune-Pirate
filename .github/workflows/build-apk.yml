name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build Web App
      working-directory: ./frontend
      run: npm run build
      env:
        VITE_API_URL: https://tune-pirate.onrender.com

    - name: Copy web assets into Android project
      working-directory: ./frontend
      run: |
        rm -rf android/app/src/main/assets/public
        mkdir -p android/app/src/main/assets/public
        cp -r dist/. android/app/src/main/assets/public/
        cp capacitor.config.json android/app/src/main/assets/

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Make gradlew executable
      working-directory: ./frontend/android
      run: chmod +x gradlew

    - name: Accept Android SDK Licenses
      run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Build APK
      working-directory: ./frontend/android
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tune-pirate-apk
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

